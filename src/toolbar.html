<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    height: 100vh;
    background: #111a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
}

/* ===== TAB BAR ===== */
.tab-bar {
    display: flex;
    align-items: flex-end;
    padding: 0 8px;
    height: 48px;
    background: linear-gradient(180deg, #080e1c 0%, #0e1628 100%);
    border-bottom: 1px solid #1a2540;
    flex-shrink: 0;
    position: relative;
}

.tabs-container {
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    gap: 2px;
    flex: 0 1 auto;
    min-width: 0;
    overflow: hidden;
}

.tabs-left {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    flex: 1;
    min-width: 0;
}

.tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    height: 40px;
    background: rgba(20,30,50,0.6);
    border: 1px solid rgba(60,80,120,0.2);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    color: #8898b0;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    min-width: 40px;
    max-width: 220px;
    flex: 1 1 180px;
    overflow: hidden;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.tab.active {
    background: rgba(30,45,70,0.8);
    color: #e8f0ff;
    border-color: rgba(80,110,160,0.3);
}

.tab:hover:not(.active) { background: rgba(25,38,60,0.7); }

.tab-favicon {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.tab-favicon svg { width: 18px; height: 18px; }

.tab-title {
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 13px; line-height: 40px;
}

.tab-close {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px; cursor: pointer;
    opacity: 0; transition: opacity 0.1s, background 0.1s;
    flex-shrink: 0;
}
.tab-close svg { width: 10px; height: 10px; stroke: #667; stroke-width: 2; stroke-linecap: round; }
.tab:hover .tab-close { opacity: 1; }
.tab-close:hover { background: rgba(255,60,60,0.3); }
.tab-close:hover svg { stroke: #ff6666; }

.new-tab-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px; cursor: pointer;
    transition: background 0.15s;
    margin: 0 4px 2px;
    flex-shrink: 0;
}
.new-tab-btn svg { width: 16px; height: 16px; stroke: #667; stroke-width: 2; stroke-linecap: round; }
.new-tab-btn:hover { background: rgba(100,140,200,0.15); }
.new-tab-btn:hover svg { stroke: #a0b8d0; }

/* ===== NAV BAR ===== */
.nav-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    gap: 6px;
    background: linear-gradient(180deg, #0e1628 0%, #111a2e 100%);
    flex-shrink: 0;
}

.nav-group {
    display: flex; align-items: center; gap: 6px;
}

.nav-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px; border: none; background: transparent;
    cursor: pointer; transition: background 0.12s;
}
.nav-btn svg { width: 24px; height: 24px; stroke: #7a8aa5; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn:hover svg { stroke: #b0c0d8; }
.nav-btn:hover { background: rgba(100,140,200,0.12); }
.nav-btn:active { transform: scale(0.93); }
.nav-btn .stop-icon { display: none; }
.nav-btn.loading .reload-icon { display: none; }
.nav-btn.loading .stop-icon { display: block; }

@keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
.nav-btn.loading svg { animation: spin 0.8s linear infinite; }

.address-wrap {
    flex: 0 1 600px;
    display: flex; align-items: center;
    height: 42px;
    background: rgba(8,14,28,0.9);
    border: 1px solid rgba(60,80,120,0.25);
    border-radius: 5px;
    padding: 0 18px;
    gap: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.address-wrap:focus-within {
    border-color: rgba(80,120,200,0.4);
    box-shadow: 0 0 12px rgba(60,120,200,0.12);
}

.address-icon { flex-shrink: 0; display: flex; align-items: center; }
.address-icon svg { width: 18px; height: 18px; stroke: #5a6a80; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.address-bar {
    flex: 1; height: 100%;
    background: transparent; border: none;
    color: #c0d0e0; font-size: 15px; outline: none;
}
.address-bar::placeholder { color: #4a5a70; }

.toolbar-right {
    display: flex; align-items: center; gap: 4px;
}

.toolbar-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px; cursor: pointer;
    transition: background 0.12s;
}
.toolbar-btn svg { width: 22px; height: 22px; stroke: #7a8aa5; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.toolbar-btn:hover svg { stroke: #b0c0d8; }
.toolbar-btn:hover { background: rgba(100,140,200,0.12); }

/* ===== FIND BAR ===== */
.find-bar {
    display: none;
    align-items: center;
    padding: 0 12px;
    height: 36px;
    background: #0d1525;
    border-bottom: 1px solid rgba(60,80,120,0.2);
    flex-shrink: 0;
    gap: 8px;
}
.find-bar.open { display: flex; }
.find-input {
    flex: 0 1 260px; height: 26px;
    background: rgba(8,14,28,0.9); border: 1px solid rgba(60,80,120,0.3);
    border-radius: 5px; color: #c0d0e0; font-size: 13px;
    padding: 0 10px; outline: none;
}
.find-input:focus { border-color: rgba(0,255,170,0.3); }
.find-count { font-size: 12px; color: #5a6a80; min-width: 60px; }
.find-btn {
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    border-radius: 5px; cursor: pointer; transition: background 0.1s;
}
.find-btn svg { width: 14px; height: 14px; stroke: #7a8aa5; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.find-btn:hover { background: rgba(100,140,200,0.15); }
.find-btn:hover svg { stroke: #b0c0d8; }
.find-close { margin-left: auto; }

/* ===== ZOOM INDICATOR ===== */
.zoom-indicator {
    display: none;
    position: fixed; bottom: 8px; right: 12px;
    background: rgba(10,16,30,0.9); border: 1px solid rgba(60,80,120,0.3);
    border-radius: 8px; padding: 4px 10px;
    font-size: 12px; color: #7fffd4;
    z-index: 9999; pointer-events: none;
    transition: opacity 0.3s;
}

/* ===== BOOKMARK BAR ===== */
.bookmark-bar {
    display: flex;
    align-items: center;
    padding: 0 12px;
    height: 34px;
    background: #0d1525;
    border-bottom: 1px solid rgba(60,80,120,0.2);
    flex-shrink: 0;
    gap: 2px;
    overflow: hidden;
}
.bm-item {
    display: flex; align-items: center; gap: 5px;
    padding: 0 10px; height: 24px;
    border-radius: 6px; cursor: pointer;
    font-size: 12px; color: #8898b0;
    white-space: nowrap; max-width: 160px;
    overflow: hidden; text-overflow: ellipsis;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
}
.bm-item:hover { background: rgba(100,140,200,0.12); color: #c0d0e0; }
.bm-item img { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
.bm-favicon { width: 14px; height: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.bm-favicon svg { width: 14px; height: 14px; }
.bm-sep { width: 1px; height: 18px; background: rgba(60,80,120,0.25); margin: 0 4px; flex-shrink: 0; }

/* ===== MENU OVERLAY ===== */
.menu-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 999;
}
.menu-overlay.open { display: block; }

.menu-panel {
    position: fixed;
    top: 48px; right: 16px;
    width: 320px;
    max-height: calc(100vh - 60px);
    background: #141c30;
    border: 1px solid rgba(60,80,120,0.3);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    overflow-y: auto;
    z-index: 1000;
    padding: 8px;
}

.menu-section {
    padding: 4px 0;
    border-bottom: 1px solid rgba(60,80,120,0.15);
}
.menu-section:last-child { border-bottom: none; }

.menu-section-title {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px 6px;
    font-size: 13px; font-weight: 600;
    color: #8898b0;
    letter-spacing: 0.5px;
}
.menu-section-title svg { width: 18px; height: 18px; stroke: #6a8aaa; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px 8px 38px;
    font-size: 13px; color: #a0b0c0;
    border-radius: 8px; cursor: pointer;
    transition: background 0.1s, color 0.1s;
}
.menu-item:hover {
    background: rgba(0,255,170,0.06);
    color: #d0e0f0;
}
.menu-item svg { width: 16px; height: 16px; stroke: #6a7a90; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.menu-item:hover svg { stroke: #a0b8d0; }
</style>
</head>

        </div>
        <div class="menu-section">
            <div class="menu-section-title"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg><span data-i18n="tab_management">Tab Management</span></div>
            <div class="menu-item" onclick="newTab(); closeMenu()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span data-i18n="new_tab">New Tab</span></div>
            <div class="menu-item" onclick="menuAction('close_all')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span data-i18n="close_all_tabs">Close All Tabs</span></div>
        </div>
    </div>
</div>

<script>
let tabs = [{ title: 'New Tab', url: 'aurora://newtab', isPortal: true }];
let activeTab = 0;

function ipcSend(msg) { window.ipc.postMessage(msg); }

function navigate(input) {
    let url = input.trim();
    if (!url) return;
    if (!url.includes('.') && !url.startsWith('http') && !url.startsWith('aurora://'))
        url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
    else if (!url.startsWith('http://') && !url.startsWith('https://') && !url.startsWith('aurora://'))
        url = 'https://' + url;
    tabs[activeTab].url = url;
    tabs[activeTab].isPortal = (url === 'aurora://newtab');
    tabs[activeTab].title = url === 'aurora://newtab' ? 'New Tab' : url.replace(/^https?:\/\/(www\.)?/, '').split('/')[0];
    document.getElementById('addressBar').value = (url === 'aurora://newtab') ? '' : url;
    ipcSend('navigate:' + url);
    updateTabs();
}

function newTab() {
    tabs.push({ title: 'New Tab', url: 'aurora://newtab', isPortal: true });
    activeTab = tabs.length - 1;
    document.getElementById('addressBar').value = '';
    ipcSend('navigate:aurora://newtab');
    updateTabs();
}

function closeTab(i) {
    if (tabs.length <= 1) return;
    tabs.splice(i, 1);
    if (activeTab >= tabs.length) activeTab = tabs.length - 1;
    switchTab(activeTab);
}

function switchTab(i) {
    activeTab = i;
    const tab = tabs[i];
    document.getElementById('addressBar').value = tab.isPortal ? '' : tab.url;
    ipcSend('navigate:' + tab.url);
    updateTabs();
}

function updateTabs() {
    const container = document.getElementById('tabsContainer');
    container.querySelectorAll('.tab').forEach(t => t.remove());

    const favIcons = {
        'youtube.com': '<svg viewBox="0 0 16 16" width="14" height="14"><rect x="1" y="3" width="14" height="10" rx="3" fill="#ff0000"/><polygon points="7,5 11,8 7,11" fill="#fff"/></svg>',
        'google.com': '<svg viewBox="0 0 16 16" width="14" height="14"><text x="4" y="13" font-size="12" font-weight="bold" fill="#4285f4" font-family="Arial">G</text></svg>',
        'wikipedia.org': '<svg viewBox="0 0 16 16" width="14" height="14"><text x="2" y="13" font-size="13" font-weight="bold" fill="#fff" font-family="serif">W</text></svg>',
        'github.com': '<svg viewBox="0 0 16 16" width="14" height="14" fill="#ccc"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38v-1.33C3.78 14.4 3.3 12.85 3.3 12.85c-.36-.92-.89-1.17-.89-1.17-.73-.5.05-.49.05-.49.8.06 1.23.83 1.23.83.71 1.22 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.65-.89-3.65-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.22 2.2.82A7.65 7.65 0 018 4.07c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.74.54 1.49v2.2c0 .21.15.46.55.38A8 8 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>',
    };
    const auroraFav = '<svg viewBox="0 0 16 16" fill="none"><defs><linearGradient id="tf" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00ffaa"/><stop offset="100%" stop-color="#00aaff"/></linearGradient></defs><path d="M8,2 C6,2 4,4 4,6 C4,8 5,9 7,10 C5,9 3,10 2,12 C3,13 5,13 7,12 C6,13 7,15 9,14 C11,13 12,11 12,9 C14,10 14,8 13,6 C12,4 10,2 8,2Z" fill="url(#tf)" opacity="0.9"/><circle cx="7" cy="5" r="1" fill="#fff" opacity="0.8"/></svg>';

    tabs.forEach((tab, i) => {
        const el = document.createElement('div');
        el.className = 'tab' + (i === activeTab ? ' active' : '');
        let fav = auroraFav;
        for (const [domain, icon] of Object.entries(favIcons)) {
            if (tab.url.includes(domain)) { fav = icon; break; }
        }
        el.innerHTML = `<div class="tab-favicon">${fav}</div><span class="tab-title">${tab.title}</span><span class="tab-close"><svg viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg></span>`;
        el.querySelector('.tab-title').onclick = () => switchTab(i);
        el.querySelector('.tab-close').onclick = (e) => { e.stopPropagation(); closeTab(i); };
        container.appendChild(el);
    });
}

function onUrlChanged(url) {
    if (url && url !== 'aurora://newtab' && !url.startsWith('data:')) {
        tabs[activeTab].url = url;
        tabs[activeTab].title = url.replace(/^https?:\/\/(www\.)?/, '').split('/')[0];
        tabs[activeTab].isPortal = false;
        document.getElementById('addressBar').value = url;
        updateTabs();
    }
}

function onTitleChanged(title) {
    if (title) { tabs[activeTab].title = title; updateTabs(); }
}

function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('open'); }
function closeMenu() { document.getElementById('menuOverlay').classList.remove('open'); }
function menuAction(action) { closeMenu(); ipcSend('menu:' + action); }

let isLoading = false;
function toggleReload() {
    if (isLoading) { ipcSend('stop'); setLoading(false); }
    else { ipcSend('reload'); setLoading(true); setTimeout(() => setLoading(false), 3000); }
}
function setLoading(state) {
    isLoading = state;
    const btn = document.getElementById('reloadBtn');
    if (state) btn.classList.add('loading'); else btn.classList.remove('loading');
}
function onLoadStart() { setLoading(true); }
function onLoadEnd() { setLoading(false); }

// ===== BOOKMARK BAR =====
(function() {
    const bar = document.getElementById('bookmarkBar');
    if (!bar) return;
    const bm = (typeof AURORA_BOOKMARKS !== 'undefined') ? AURORA_BOOKMARKS : {};
    const favicons = {
        'youtube.com': '<svg viewBox="0 0 14 14"><rect x="1" y="2" width="12" height="10" rx="2.5" fill="#ff0000"/><polygon points="6,4.5 9.5,7 6,9.5" fill="#fff"/></svg>',
        'google.com':  '<svg viewBox="0 0 14 14"><text x="2" y="11" font-size="11" font-weight="bold" fill="#4285f4" font-family="Arial">G</text></svg>',
        'wikipedia.org': '<svg viewBox="0 0 14 14"><text x="1" y="11" font-size="12" font-weight="bold" fill="#ccc" font-family="serif">W</text></svg>',
        'github.com':  '<svg viewBox="0 0 14 14" fill="#aaa"><path d="M7 0C3.13 0 0 3.13 0 7c0 3.09 2 5.71 4.79 6.64.35.06.48-.15.48-.33v-1.16c-1.95.42-2.36-.94-2.36-.94-.32-.8-.77-1.02-.77-1.02-.63-.43.05-.42.05-.42.7.05 1.07.72 1.07.72.62 1.06 1.63.75 2.03.57.06-.45.24-.75.44-.93-1.55-.18-3.18-.78-3.18-3.46 0-.76.27-1.39.72-1.88-.07-.18-.31-.89.07-1.85 0 0 .58-.19 1.92.71A6.7 6.7 0 017 3.56c.59 0 1.19.08 1.75.23 1.34-.9 1.92-.71 1.92-.71.38.96.14 1.67.07 1.85.45.49.72 1.12.72 1.88 0 2.69-1.64 3.28-3.2 3.46.25.22.47.65.47 1.3v1.93c0 .19.13.41.49.34A7 7 0 0014 7c0-3.87-3.13-7-7-7z"/></svg>',
        'startpage.com': '<svg viewBox="0 0 14 14"><text x="2" y="11" font-size="11" font-weight="bold" fill="#00aaff" font-family="Arial">S</text></svg>',
    };
    function getFavicon(url) {
        for (const [domain, icon] of Object.entries(favicons)) {
            if (url.includes(domain)) return icon;
        }
        // letter fallback
        try {
            const host = new URL(url).hostname.replace('www.','');
            return `<svg viewBox="0 0 14 14"><text x="2" y="11" font-size="11" font-weight="bold" fill="#7fffd4" font-family="Arial">${host[0].toUpperCase()}</text></svg>`;
        } catch { return ''; }
    }
    let first = true;
    for (const [title, url] of Object.entries(bm)) {
        if (!first) {
            const sep = document.createElement('div');
            sep.className = 'bm-sep';
            bar.appendChild(sep);
        }
        first = false;
        const item = document.createElement('div');
        item.className = 'bm-item';
        item.title = url;
        item.innerHTML = `<div class="bm-favicon">${getFavicon(url)}</div><span>${title}</span>`;
        item.onclick = () => navigate(url);
        bar.appendChild(item);
    }
})();

// ===== ZOOM =====
let currentZoom = 1.0;
let zoomTimer = null;
function setZoom(level) {
    currentZoom = Math.min(3.0, Math.max(0.25, level));
    currentZoom = Math.round(currentZoom * 100) / 100;
    ipcSend('zoom:' + currentZoom);
    const ind = document.getElementById('zoomIndicator');
    ind.textContent = Math.round(currentZoom * 100) + '%';
    ind.style.display = 'block';
    ind.style.opacity = '1';
    clearTimeout(zoomTimer);
    zoomTimer = setTimeout(() => { ind.style.opacity = '0'; setTimeout(() => { ind.style.display = 'none'; }, 300); }, 1500);
}
function zoomIn()  { setZoom(currentZoom + 0.1); }
function zoomOut() { setZoom(currentZoom - 0.1); }
function zoomReset(){ setZoom(1.0); }

// ===== FIND =====
function openFindBar() {
    const bar = document.getElementById('findBar');
    bar.classList.add('open');
    setTimeout(() => document.getElementById('findInput').focus(), 50);
}
function closeFindBar() {
    document.getElementById('findBar').classList.remove('open');
    document.getElementById('findInput').value = '';
    document.getElementById('findCount').textContent = '';
    ipcSend('find:');
}
function doFind(text) { ipcSend('find:' + text); }
function findNext() { ipcSend('find:' + document.getElementById('findInput').value); }
function findPrev() { ipcSend('findprev:' + document.getElementById('findInput').value); }
function onFindKey(e) {
    if (e.key === 'Escape') { closeFindBar(); return; }
    if (e.key === 'Enter') { e.shiftKey ? findPrev() : findNext(); }
}

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 't') { e.preventDefault(); newTab(); }
    if (e.ctrlKey && e.key === 'w') { e.preventDefault(); closeTab(activeTab); }
    if (e.ctrlKey && e.key === 'l') { e.preventDefault(); document.getElementById('addressBar').focus(); }
    if (e.ctrlKey && e.key === 'f') { e.preventDefault(); openFindBar(); }
    if (e.ctrlKey && e.key === 'p') { e.preventDefault(); ipcSend('print'); }
    if (e.ctrlKey && e.key === '=') { e.preventDefault(); zoomIn(); }
    if (e.ctrlKey && e.key === '-') { e.preventDefault(); zoomOut(); }
    if (e.ctrlKey && e.key === '0') { e.preventDefault(); zoomReset(); }
    if (e.key === 'F11') { e.preventDefault(); ipcSend('fullscreen'); }
    if (e.key === 'F12') { e.preventDefault(); ipcSend('devtools'); }
    if (e.key === 'Escape') { if (isLoading) toggleReload(); closeFindBar(); }
    const n = parseInt(e.key);
    if (e.ctrlKey && n >= 1 && n <= 9 && n <= tabs.length) { e.preventDefault(); switchTab(n - 1); }
});

(function() {
    try {
        const L = AURORA_LOCALE;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (L[key]) el.textContent = L[key];
        });
    } catch(e) {}
})();
</script>
</body></html>
