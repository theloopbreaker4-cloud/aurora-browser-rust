<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Aurora</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    height: 100vh; background: #030610; color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; user-select: none;
}
.portal {
    position: absolute; top:0; left:0; right:0; bottom:0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; overflow: hidden;
}
.aurora-svg-bg {
    position: absolute; top:0; left:0; width:100%; height:100%;
    z-index: 0; pointer-events: none;
}
.stars-layer {
    position: absolute; top:0; left:0; right:0; bottom:0;
    z-index: 1; pointer-events: none;
}
.star { position: absolute; background: #fff; border-radius: 50%; }
@keyframes twinkle { 0%{opacity:0.1} 100%{opacity:0.9} }
.portal-content {
    z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
}
.logo-wrap {
    display: flex; flex-direction: column;
    align-items: center; margin-bottom: 30px;
}
.logo-img {
    width: 120px; height: 120px; margin-bottom: 16px;
    opacity: 0.85;
    filter: drop-shadow(0 0 25px rgba(0,255,170,0.35)) drop-shadow(0 0 50px rgba(0,255,170,0.15));
}
.portal-title {
    font-size: 44px; font-weight: 600;
    letter-spacing: 10px; text-transform: none;
    /* Solid-color fallback for engines without background-clip:text (Servo).
       Browsers that support clip-text override via the @supports block below. */
    color: #9fffd1;
    font-family: 'Gabriola', 'Segoe Script', 'Palatino Linotype', 'Georgia', serif;
    filter: drop-shadow(0 0 14px rgba(0,255,200,0.45)) drop-shadow(0 0 30px rgba(0,255,200,0.18));
}
@supports (-webkit-background-clip: text) or (background-clip: text) {
    .portal-title {
        background: linear-gradient(90deg,#a8ffe8,#6fe7ff,#9fffd1);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
    }
}
.portal-search-wrap {
    width: 560px; max-width: 85%; height: 44px;
    display: flex; align-items: center; gap: 10px;
    background: rgba(10,16,30,0.75);
    border: 1px solid rgba(0,255,170,0.1);
    border-radius: 22px; padding: 0 18px;
    margin-bottom: 45px; backdrop-filter: blur(10px);
    transition: border-color 0.3s, box-shadow 0.3s;
}
.portal-search-wrap:focus-within {
    border-color: rgba(0,255,170,0.3);
    box-shadow: 0 0 20px rgba(0,255,170,0.06);
}
.portal-search-wrap svg { width:16px; height:16px; stroke:#3a5a70; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.portal-search {
    flex:1; height:100%; background:transparent; border:none;
    color:#c0d8e8; font-size:14px; outline:none;
}
.portal-search::placeholder { color:#2a3a50; }
.bookmarks { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.bookmark {
    width: 120px; height: 100px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    background: rgba(10,16,30,0.65);
    border: 1px solid rgba(40,60,100,0.15);
    border-radius: 14px; cursor: pointer;
    transition: all 0.25s; text-decoration: none; color: #c0d0e0;
    backdrop-filter: blur(8px);
}
.bookmark:hover {
    background: rgba(20,35,60,0.8);
    border-color: rgba(0,255,170,0.2);
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    transform: translateY(-4px);
}
.bookmark-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
}
.bookmark-title { font-size: 11px; color: #7a8a9a; }
</style>
</head>
<body>
<div class="portal">
    <!-- SVG Aurora -->
    <svg class="aurora-svg-bg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
        <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#010308"/>
                <stop offset="30%"  stop-color="#030c1a"/>
                <stop offset="65%"  stop-color="#060f22"/>
                <stop offset="100%" stop-color="#080e20"/>
            </linearGradient>

            <!-- Blur filters — oversized to prevent any clipping -->
            <filter id="b1" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="90"/></filter>
            <filter id="b2" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="140"/></filter>
            <filter id="b3" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="60"/></filter>
            <filter id="b4" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="38"/></filter>
            <!-- Extra strong blur for curtain stripes -->
            <filter id="bC" x="-150%" y="-30%" width="400%" height="160%"><feGaussianBlur stdDeviation="55 28"/></filter>

            <!-- Curtain stripe gradients — vertical, fade top+bottom -->
            <linearGradient id="sv1" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#00ffb0" stop-opacity="0"/>
                <stop offset="8%"   stop-color="#00ffb0" stop-opacity="0.22"/>
                <stop offset="45%"  stop-color="#00ffc8" stop-opacity="0.28"/>
                <stop offset="72%"  stop-color="#20ffe0" stop-opacity="0.15"/>
                <stop offset="90%"  stop-color="#00e8ff" stop-opacity="0.05"/>
                <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="sv2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#40ffa0" stop-opacity="0"/>
                <stop offset="10%"  stop-color="#40ffa0" stop-opacity="0.18"/>
                <stop offset="50%"  stop-color="#60ffb8" stop-opacity="0.22"/>
                <stop offset="78%"  stop-color="#30ffc0" stop-opacity="0.1"/>
                <stop offset="100%" stop-color="#10ffaa" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="sv3" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#00d8ff" stop-opacity="0"/>
                <stop offset="12%"  stop-color="#00e8ff" stop-opacity="0.14"/>
                <stop offset="55%"  stop-color="#10f0ff" stop-opacity="0.18"/>
                <stop offset="82%"  stop-color="#00d0ff" stop-opacity="0.07"/>
                <stop offset="100%" stop-color="#00b8ff" stop-opacity="0"/>
            </linearGradient>

            <!-- Aurora band gradients — horizontal -->
            <linearGradient id="c1" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#00ffaa" stop-opacity="0"/>
                <stop offset="15%"  stop-color="#00ffaa" stop-opacity="0.55"/>
                <stop offset="40%"  stop-color="#00ffc8" stop-opacity="0.7"/>
                <stop offset="60%"  stop-color="#20ffe0" stop-opacity="0.58"/>
                <stop offset="80%"  stop-color="#00e8ff" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="c2" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#00e8c0" stop-opacity="0"/>
                <stop offset="18%"  stop-color="#00f0b0" stop-opacity="0.42"/>
                <stop offset="45%"  stop-color="#30ffd0" stop-opacity="0.58"/>
                <stop offset="68%"  stop-color="#00ffe8" stop-opacity="0.44"/>
                <stop offset="88%"  stop-color="#00d8ff" stop-opacity="0.15"/>
                <stop offset="100%" stop-color="#00b0ff" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="c3" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#50ffb0" stop-opacity="0"/>
                <stop offset="28%"  stop-color="#40ffa0" stop-opacity="0.32"/>
                <stop offset="52%"  stop-color="#60ffb8" stop-opacity="0.44"/>
                <stop offset="74%"  stop-color="#30ffc0" stop-opacity="0.28"/>
                <stop offset="100%" stop-color="#20ffaa" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="c4" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#00d0ff" stop-opacity="0"/>
                <stop offset="32%"  stop-color="#00e0ff" stop-opacity="0.26"/>
                <stop offset="56%"  stop-color="#10f0ff" stop-opacity="0.36"/>
                <stop offset="80%"  stop-color="#00ccff" stop-opacity="0.16"/>
                <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
            </linearGradient>

            <!-- Ambient glow -->
            <radialGradient id="amb" cx="50%" cy="35%" r="65%">
                <stop offset="0%"   stop-color="#00ffa0" stop-opacity="0.07"/>
                <stop offset="55%"  stop-color="#00e8c0" stop-opacity="0.03"/>
                <stop offset="100%" stop-color="#00c0ff" stop-opacity="0"/>
            </radialGradient>
        </defs>

        <!-- Sky -->
        <rect width="1440" height="900" fill="url(#sky)"/>
        <rect width="1440" height="900" fill="url(#amb)"/>

        <!-- ── Curtain stripes ── softly blurred vertical ribbons, full height -->
        <g filter="url(#bC)" opacity="0.4">
            <rect x="215"  y="-20" width="38" height="940" fill="url(#sv2)" opacity="0.38">
                <animate attributeName="opacity" dur="17s" repeatCount="indefinite" values="0.28;0.45;0.32;0.42;0.28"/>
                <animate attributeName="x"       dur="22s" repeatCount="indefinite" values="215;230;208;222;215"/>
            </rect>
            <rect x="370"  y="-20" width="28" height="940" fill="url(#sv1)" opacity="0.32">
                <animate attributeName="opacity" dur="21s" repeatCount="indefinite" values="0.22;0.38;0.28;0.35;0.22"/>
                <animate attributeName="x"       dur="18s" repeatCount="indefinite" values="370;385;362;378;370"/>
            </rect>
            <rect x="530"  y="-20" width="44" height="940" fill="url(#sv3)" opacity="0.28">
                <animate attributeName="opacity" dur="14s" repeatCount="indefinite" values="0.18;0.35;0.24;0.32;0.18"/>
                <animate attributeName="x"       dur="25s" repeatCount="indefinite" values="530;548;520;540;530"/>
            </rect>
            <rect x="700"  y="-20" width="34" height="940" fill="url(#sv1)" opacity="0.35">
                <animate attributeName="opacity" dur="19s" repeatCount="indefinite" values="0.25;0.42;0.3;0.38;0.25"/>
                <animate attributeName="x"       dur="16s" repeatCount="indefinite" values="700;718;692;710;700"/>
            </rect>
            <rect x="870"  y="-20" width="30" height="940" fill="url(#sv2)" opacity="0.3">
                <animate attributeName="opacity" dur="23s" repeatCount="indefinite" values="0.2;0.36;0.26;0.33;0.2"/>
                <animate attributeName="x"       dur="20s" repeatCount="indefinite" values="870;886;862;878;870"/>
            </rect>
            <rect x="1040" y="-20" width="36" height="940" fill="url(#sv3)" opacity="0.32">
                <animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="0.22;0.38;0.28;0.35;0.22"/>
                <animate attributeName="x"       dur="28s" repeatCount="indefinite" values="1040;1055;1032;1048;1040"/>
            </rect>
            <rect x="1210" y="-20" width="26" height="940" fill="url(#sv1)" opacity="0.26">
                <animate attributeName="opacity" dur="18s" repeatCount="indefinite" values="0.18;0.32;0.22;0.28;0.18"/>
                <animate attributeName="x"       dur="24s" repeatCount="indefinite" values="1210;1224;1204;1216;1210"/>
            </rect>
        </g>

        <!-- ── Aurora bands — wide ellipses filling full height ── -->
        <g opacity="0.35">
            <!-- Base: very wide low layer stretching down -->
            <ellipse cx="700" cy="380" rx="980" ry="420" fill="url(#c1)" filter="url(#b2)" opacity="0.5">
                <animateTransform attributeName="transform" type="translate" dur="32s" repeatCount="indefinite"
                    values="0,0; 55,18; -32,-10; 42,8; -22,14; 0,0"/>
                <animate attributeName="opacity" dur="26s" repeatCount="indefinite"
                    values="0.38;0.58;0.44;0.62;0.36;0.38"/>
                <animate attributeName="ry" dur="24s" repeatCount="indefinite"
                    values="420;490;385;458;400;420"/>
            </ellipse>

            <!-- Mid: slightly narrower, faster -->
            <ellipse cx="760" cy="310" rx="900" ry="340" fill="url(#c2)" filter="url(#b1)" opacity="0.55">
                <animateTransform attributeName="transform" type="translate" dur="24s" repeatCount="indefinite"
                    values="-42,0; 62,20; -28,-12; 52,10; -38,4; -42,0"/>
                <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                    values="0.44;0.66;0.5;0.64;0.42;0.44"/>
                <animate attributeName="ry" dur="20s" repeatCount="indefinite"
                    values="340;400;305;370;320;340"/>
            </ellipse>

            <!-- Bright core band -->
            <ellipse cx="680" cy="260" rx="760" ry="200" fill="url(#c1)" filter="url(#b3)" opacity="0.48">
                <animateTransform attributeName="transform" type="translate" dur="20s" repeatCount="indefinite"
                    values="22,0; -52,12; 36,-6; -32,14; 22,0"/>
                <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
                    values="0.36;0.58;0.42;0.55;0.36"/>
                <animate attributeName="ry" dur="16s" repeatCount="indefinite"
                    values="200;250;175;230;195;200"/>
            </ellipse>

            <!-- Upper shimmer -->
            <ellipse cx="730" cy="180" rx="840" ry="160" fill="url(#c3)" filter="url(#b2)" opacity="0.38">
                <animateTransform attributeName="transform" type="translate" dur="28s" repeatCount="indefinite"
                    values="-22,6; 46,-10; -36,14; 32,-5; -22,6"/>
                <animate attributeName="opacity" dur="20s" repeatCount="indefinite"
                    values="0.26;0.44;0.3;0.42;0.26"/>
            </ellipse>

            <!-- Blue-teal accent -->
            <ellipse cx="720" cy="220" rx="720" ry="260" fill="url(#c4)" filter="url(#b1)" opacity="0.35">
                <animateTransform attributeName="transform" type="translate" dur="36s" repeatCount="indefinite"
                    values="32,0; -62,14; 42,-8; -48,10; 32,0"/>
                <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
                    values="0.26;0.42;0.3;0.4;0.26"/>
                <animate attributeName="ry" dur="18s" repeatCount="indefinite"
                    values="260;320;230;290;260"/>
            </ellipse>

            <!-- Bright inner ribbon -->
            <ellipse cx="720" cy="210" rx="600" ry="60" fill="#60ffe8" filter="url(#b4)" opacity="0.28">
                <animateTransform attributeName="transform" type="translate" dur="16s" repeatCount="indefinite"
                    values="-22,0; 32,8; -20,-5; 26,4; -22,0"/>
                <animate attributeName="opacity" dur="11s" repeatCount="indefinite"
                    values="0.18;0.36;0.22;0.32;0.18"/>
                <animate attributeName="ry" dur="13s" repeatCount="indefinite"
                    values="60;85;48;75;60"/>
            </ellipse>

            <!-- Deep background green wash -->
            <ellipse cx="720" cy="480" rx="1120" ry="500" fill="url(#c3)" filter="url(#b2)" opacity="0.2">
                <animateTransform attributeName="transform" type="translate" dur="40s" repeatCount="indefinite"
                    values="0,0; -42,20; 32,-12; -28,10; 0,0"/>
                <animate attributeName="opacity" dur="32s" repeatCount="indefinite"
                    values="0.14;0.24;0.18;0.22;0.14"/>
            </ellipse>
        </g>
    </svg>

    <div class="stars-layer" id="starsLayer"></div>

    <div class="portal-content">
        <div class="logo-wrap">
            <img class="logo-img" src="__ICON_BASE64__" alt="Aurora">
            <h1 class="portal-title">Aurora</h1>
        </div>
        <div class="portal-search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input class="portal-search" id="portalSearch" type="text"
                   placeholder="Search the web..."
                   onkeydown="if(event.key==='Enter') navigateFromPortal(this.value)">
        </div>
        <div class="bookmarks" id="bookmarksGrid"></div>
    </div>
</div>

<script>
const IPC_TOKEN = "__IPC_TOKEN__";
const BOOKMARKS = __BOOKMARKS_JSON__;

function ipcSend(msg) {
    if(window.ipc){ window.ipc.postMessage(IPC_TOKEN + ":" + msg); }
    else { window.location.href = "aurora-ipc:" + encodeURIComponent(IPC_TOKEN + ":" + msg); }
}

(function(){
    const c=document.getElementById('starsLayer');
    for(let i=0;i<250;i++){
        const s=document.createElement('div');
        s.className='star';
        s.style.left=Math.random()*100+'%';
        s.style.top=Math.random()*65+'%';
        const sz=Math.random()*2+0.5;
        s.style.width=s.style.height=sz+'px';
        s.style.opacity=Math.random()*0.5+0.1;
        s.style.animation=`twinkle ${2+Math.random()*5}s ease-in-out ${Math.random()*5}s infinite alternate`;
        c.appendChild(s);
    }
})();

function loadBookmarks(){
    const grid=document.getElementById('bookmarksGrid');
    grid.innerHTML='';
    const meta={
        'YouTube':{bg:'#1a0a0a',icon:'<svg viewBox="0 0 24 24" width="26" height="26"><rect x="2" y="4" width="20" height="16" rx="4" fill="#ff0000"/><polygon points="10,8 16,12 10,16" fill="#fff"/></svg>'},
        'Google':{bg:'#0a1a15',icon:'<svg viewBox="0 0 24 24" width="26" height="26"><circle cx="12" cy="12" r="10" fill="#1a1a2e"/><text x="12" y="17" text-anchor="middle" font-size="14" font-weight="bold" fill="#4285f4" font-family="Arial">G</text></svg>'},
        'Wikipedia':{bg:'#121212',icon:'<svg viewBox="0 0 24 24" width="26" height="26"><circle cx="12" cy="12" r="10" fill="#1a1a1a"/><text x="12" y="17" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff" font-family="serif">W</text></svg>'},
        'GitHub':{bg:'#0a0a12',icon:'<svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="10" fill="#1a1a2e"/><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0112 6.8c.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.7-4.57 4.95.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10 10 0 0022 12c0-5.52-4.48-10-10-10z" fill="#ccc"/></svg>'},
        'Startpage':{bg:'#0a1218',icon:'<svg viewBox="0 0 24 24" width="26" height="26"><circle cx="12" cy="12" r="10" fill="#0a1828"/><text x="12" y="17" text-anchor="middle" font-size="14" font-weight="bold" fill="#00aaff" font-family="Arial">S</text></svg>'},
    };
    for(const[title,url] of Object.entries(BOOKMARKS)){
        const m=meta[title]||{bg:'#101520',icon:`<span style="font-size:20px;font-weight:bold;color:#7fffd4">${title[0]}</span>`};
        const a=document.createElement('a');
        a.className='bookmark'; a.href=url;
        a.onclick=(e)=>{e.preventDefault();navigateFromPortal(url);};
        a.innerHTML=`<div class="bookmark-icon" style="background:${m.bg}">${m.icon}</div><div class="bookmark-title">${title}</div>`;
        grid.appendChild(a);
    }
}

function navigateFromPortal(input){
    let url=input.trim();
    if(!url)return;
    if(!url.includes('.')&&!url.startsWith('http'))
        url='https://www.google.com/search?q='+encodeURIComponent(url);
    else if(!url.startsWith('http://') && !url.startsWith('https://'))
        url='https://'+url;
    ipcSend('navigate:'+url);
}

loadBookmarks();
</script>
</body></html>
