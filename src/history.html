<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Aurora History</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030610;color:#d0dcea;font-family:'Segoe UI',sans-serif;min-height:100vh;padding:40px 56px}
.page{max-width:900px;margin:0 auto}
.page-header{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.page-header svg{width:26px;height:26px;stroke:#00ffaa;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:28px;font-weight:600;color:#7fffd4;letter-spacing:0.5px}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.search-wrap{
    flex:1;display:flex;align-items:center;gap:10px;
    background:rgba(10,18,32,0.9);
    border:1px solid rgba(60,80,120,0.3);
    border-radius:10px;padding:0 14px;height:38px;
    transition:border-color 0.2s;
}
.search-wrap:focus-within{border-color:rgba(0,255,170,0.3)}
.search-wrap svg{width:14px;height:14px;stroke:#3a5a72;fill:none;stroke-width:2;flex-shrink:0}
.search-input{flex:1;background:transparent;border:none;color:#b0c8e0;font-size:13px;outline:none}
.search-input::placeholder{color:#2a3a50}
.btn-clear{
    background:#0a1020;color:#b0c8e0;
    border:1px solid rgba(255,80,80,0.2);
    border-radius:8px;padding:8px 16px;
    font-size:12px;cursor:pointer;white-space:nowrap;
    transition:border-color 0.2s;
}
.btn-clear:hover{border-color:rgba(255,80,80,0.45)}
.group-label{
    font-size:11px;font-weight:700;color:#3a5a72;
    letter-spacing:0.8px;text-transform:uppercase;
    padding:8px 0 6px;border-bottom:1px solid rgba(60,80,120,0.15);
    margin-bottom:4px;margin-top:20px;
}
.group-label:first-child{margin-top:0}
.entry{
    display:flex;align-items:center;gap:14px;
    padding:9px 12px;border-radius:8px;
    cursor:pointer;transition:background 0.15s;
    position:relative;
}
.entry:hover{background:rgba(10,20,40,0.7)}
.entry:hover .del-btn{opacity:1}
.favicon{
    width:20px;height:20px;border-radius:4px;flex-shrink:0;
    background:#0a1828;display:flex;align-items:center;justify-content:center;
    font-size:10px;color:#4a6a84;font-weight:700;overflow:hidden;
}
.favicon img{width:100%;height:100%;object-fit:cover;border-radius:3px}
.entry-info{flex:1;min-width:0}
.entry-title{font-size:13px;color:#c0d8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-url{font-size:11px;color:#3a5a72;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.entry-time{font-size:11px;color:#2a3a52;flex-shrink:0}
.del-btn{
    opacity:0;background:transparent;border:none;cursor:pointer;
    color:#603030;padding:4px;border-radius:4px;flex-shrink:0;
    transition:opacity 0.15s,color 0.15s;
}
.del-btn:hover{color:#ff6060}
.del-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.empty{
    text-align:center;padding:80px 20px;color:#2a3a50;
    font-size:14px;line-height:2;
}
.empty svg{width:48px;height:48px;stroke:#1a2a3a;fill:none;stroke-width:1.2;margin-bottom:16px;display:block;margin:0 auto 16px}
</style>
</head>
<body>
<div class="page">
    <div class="page-header">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
        <h1>History</h1>
    </div>
    <div class="toolbar">
        <div class="search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input class="search-input" id="searchInput" placeholder="Search history..." oninput="filterHistory(this.value)">
        </div>
        <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>
    <div id="historyList"></div>
</div>

<script>
const IPC_TOKEN = "__IPC_TOKEN__";
const HISTORY_DATA = __HISTORY_JSON__;

function ipcSend(msg){ window.ipc.postMessage(IPC_TOKEN+":"+msg); }
function navigate(url){ ipcSend("navigate:"+url); }

function fmtTime(ts){
    const d=new Date(ts);
    const now=new Date();
    const diff=now-d;
    if(diff<60000) return "just now";
    if(diff<3600000) return Math.floor(diff/60000)+"m ago";
    if(diff<86400000) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function groupLabel(ts){
    const d=new Date(ts);
    const now=new Date();
    const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const yday=new Date(today-86400000);
    if(d>=today) return "Today";
    if(d>=yday) return "Yesterday";
    return d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
}
function faviconHtml(url){
    try{
        const host=new URL(url).hostname;
        return `<img src="https://www.google.com/s2/favicons?domain=${host}&sz=32" onerror="this.style.display='none'" alt="">`;
    }catch(e){ return ''; }
}

let filteredData = [...HISTORY_DATA];

function renderHistory(data){
    const list=document.getElementById('historyList');
    if(!data.length){
        list.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>No history yet</div>`;
        return;
    }
    let html='';
    let lastGroup='';
    for(const item of data){
        const g=groupLabel(item.time);
        if(g!==lastGroup){ html+=`<div class="group-label">${g}</div>`; lastGroup=g; }
        html+=`<div class="entry" onclick="navigate('${item.url.replace(/'/g,"\\'")}')">
            <div class="favicon">${faviconHtml(item.url)}</div>
            <div class="entry-info">
                <div class="entry-title">${escHtml(item.title||item.url)}</div>
                <div class="entry-url">${escHtml(item.url)}</div>
            </div>
            <div class="entry-time">${fmtTime(item.time)}</div>
            <button class="del-btn" onclick="event.stopPropagation();removeEntry(${item.time})" title="Remove">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>`;
    }
    list.innerHTML=html;
}

function escHtml(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function filterHistory(q){
    const lq=q.toLowerCase();
    filteredData=HISTORY_DATA.filter(i=>
        (i.title||'').toLowerCase().includes(lq)||
        (i.url||'').toLowerCase().includes(lq)
    );
    renderHistory(filteredData);
}

function removeEntry(ts){
    const idx=HISTORY_DATA.findIndex(i=>i.time===ts);
    if(idx>-1) HISTORY_DATA.splice(idx,1);
    filterHistory(document.getElementById('searchInput').value);
    ipcSend('history:remove:'+ts);
}

function clearAll(){
    if(!confirm('Clear all history?')) return;
    HISTORY_DATA.length=0;
    filteredData=[];
    renderHistory([]);
    ipcSend('history:clear');
}

renderHistory(HISTORY_DATA);
</script>
</body></html>
