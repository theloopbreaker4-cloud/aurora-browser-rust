<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Aurora Tab Groups</title>
<script>var AURORA_LOCALE=__LOCALE_JSON__;var IPC_TOKEN="__IPC_TOKEN__";</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1220;color:#cfe0f0;font-family:'Segoe UI',sans-serif;padding:48px 56px;min-height:100vh}
.page{max-width:880px;margin:0 auto}
.header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.header svg{width:34px;height:34px;stroke:#7fffd4;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:30px;font-weight:600;color:#7fffd4;letter-spacing:0.5px}
.subhead{font-size:13px;color:#6f829c;margin-bottom:32px}
.card{
    background:rgba(12,18,34,0.92);border:1px solid rgba(60,80,120,0.25);
    border-radius:14px;padding:28px 32px;
}
.card h2{font-size:14px;font-weight:700;color:#8da0be;margin-bottom:12px;letter-spacing:0.4px;text-transform:uppercase}
.card p{font-size:13px;color:#a0b4cc;line-height:1.6;margin-bottom:14px}
.coming{
    display:inline-block;padding:4px 12px;border-radius:999px;
    background:rgba(200,180,60,0.12);color:#e0c060;
    font-size:11px;font-weight:700;letter-spacing:0.5px;
    margin-bottom:12px;
}
.preview{
    display:flex;gap:8px;margin-top:18px;padding:12px;
    background:rgba(8,12,22,0.6);border-radius:10px;
    overflow-x:auto;
}
.group{
    display:flex;align-items:center;gap:6px;padding:6px 12px;
    border-radius:8px;font-size:12px;color:#cfe0f0;
    flex-shrink:0;
}
.group.work{background:rgba(60,160,160,0.15);border:1px solid rgba(60,160,160,0.4)}
.group.research{background:rgba(180,120,80,0.15);border:1px solid rgba(180,120,80,0.4)}
.group.social{background:rgba(120,80,180,0.15);border:1px solid rgba(120,80,180,0.4)}
.dot{width:8px;height:8px;border-radius:50%}
.dot.work{background:#3ca0a0}
.dot.research{background:#b07850}
.dot.social{background:#7850b0}
.tab-stub{
    height:30px;padding:0 10px;background:rgba(255,255,255,0.04);
    border-radius:6px 6px 0 0;display:flex;align-items:center;
    font-size:11px;color:#8da0be;flex-shrink:0;
}
</style></head><body>
<div class="page">
<div class="header">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <h1 data-i18n="tab_groups">Tab Groups</h1>
</div>
<div class="subhead">Organize related tabs into named, color-coded groups.</div>

<div class="card">
    <span class="coming">Coming Soon</span>
    <h2>Color-coded groups</h2>
    <p>Right-click a tab to add it to a group. Groups are persistent across sessions and can be collapsed to save space in the tab bar.</p>
    <div class="preview">
        <div class="group work"><span class="dot work"></span>Work</div>
        <div class="tab-stub">Inbox</div>
        <div class="tab-stub">Calendar</div>
        <div class="group research"><span class="dot research"></span>Research</div>
        <div class="tab-stub">arxiv.org</div>
        <div class="tab-stub">wikipedia</div>
        <div class="group social"><span class="dot social"></span>Social</div>
        <div class="tab-stub">twitter</div>
    </div>
</div>

<script>
try {
    const L = AURORA_LOCALE;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (L[k]) el.textContent = L[k];
    });
} catch(e) {}
</script>
</body></html>
